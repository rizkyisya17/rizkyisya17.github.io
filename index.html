<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RizkyIsya</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div id="splash-screen">
        <div class="splash-content">
            <h1 class="invitation-title">Dear {name}</h1>
            <button id="open-invitation-btn" class="next-section-btn">Open</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content">
        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-bar-fill"></div>
            <div class="progress-step active" data-step="1">💌</div>
            <div class="progress-step" data-step="2">💍</div>
            <div class="progress-step" data-step="3">👩‍❤️‍👨</div>
        </div>

        <!-- Story Container -->
        <div class="story-container">
            <!-- SECTION 1 -->
            <section class="story-section" id="section1">
                <div class="text-block">
                    <h2>SECTION 1</h2>
                    <p>This is section 1 Text.</p>
                    <button class="next-section-btn">Continue the story</button>
                </div>
                <div class="image-block">
                    <img src="sec1.png" 
                         alt="Illustration of the Enchanted Forest" 
                         class="image-placeholder" />
                </div>
            </section>

            <!-- SECTION 2 -->
            <section class="story-section" id="section2">
                <div class="text-block">
                    <h2>SECTION 2</h2>
                    <p>This is section 2 Text.</p>
                    <button class="next-section-btn">Discover the next part</button>
                </div>
                <div class="image-block">
                    <img src="sec2.png" 
                         alt="Illustration of the mythical creature" 
                         class="image-placeholder" />
                </div>
            </section>

            <!-- SECTION 3 -->
            <section class="story-section" id="section3">
                <div class="text-block">
                    <h2>SECTION 3</h2>
                    <p>This is section 3 Text.</p>
                </div>
                <div class="image-block">
                    <img src="sec3.png" 
                         alt="Illustration of the final ritual" 
                         class="image-placeholder" />
                </div>
            </section>
        </div>

        <!-- Audio Controls -->
        <div class="audio-controls">
            <audio id="background-audio" loop preload="auto">
                <source src="touch.mp3" type="audio/mpeg">
            </audio>
            <button id="mute-btn">🔊</button>
        </div>

        <!-- Modal -->
        <div class="modal-overlay">
            <img class="modal-image" src="" alt="Image en grand">
            <div class="modal-close"><span>×</span></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
